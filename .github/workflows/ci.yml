name: CI

on:
  push:
    branches: ["main"]
  pull_request:

# Cancel superseded runs for the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wire-contract:
    name: Wire-contract schema gate (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Validate every event against rr-mobile-schema.json
        run: ./gradlew -p tools/wire-verify test --no-daemon

  android:
    name: Android library (AAR + unit tests + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Assemble, test, lint
        # AGP 9 builds host (unit) tests for a single build type only, so the
        # task is testDebugUnitTest — testReleaseUnitTest no longer exists.
        run: ./gradlew :openlog-replay:assembleRelease :openlog-replay:testDebugUnitTest :openlog-replay:lintRelease --no-daemon
